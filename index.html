<div class="wrap">

      </div>
      <div>
        <h1>FarmGrid</h1>
        <p>แผงควบคุมอุปกรณ์ ESP32 · sbtc-mng</p>
      </div>
    </div>
    <div class="status-pill" id="conn-pill">
      <span class="dot" id="conn-dot"></span>
      <span id="conn-text">กำลังเชื่อมต่อ…</span>
    </div>
  </header>

  <div class="section-label">อุปกรณ์ควบคุม · Actuators</div>
  <div class="grid" id="led-grid">
    <div class="card"><div class="skeleton"></div></div>
    <div class="card"><div class="skeleton"></div></div>
  </div>

  <div class="section-label">เซนเซอร์ · Live Sensors</div>
  <div class="grid" id="sensor-grid">
    <div class="card"><div class="skeleton"></div></div>
  </div>

  <footer>อัปเดตอัตโนมัติทุก <span id="refresh-sec">5</span> วินาที · ดึงข้อมูลจาก <span>api.php</span></footer>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://tc.sbtc-mng.com/api.php";
const ledGrid = document.getElementById('led-grid');
const sensorGrid = document.getElementById('sensor-grid');
const connDot = document.getElementById('conn-dot');
const connText = document.getElementById('conn-text');
const toastEl = document.getElementById('toast');

let toastTimer;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2400);
}

const ledIcon = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>`;
const sensorIcons = {
  Temperature: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>`,
  Humidity: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69s6 6.2 6 10.31a6 6 0 0 1-12 0c0-4.11 6-10.31 6-10.31z"/></svg>`,
  "Soil Moisture": `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M2 12c0-5 4-9 10-9s10 4 10 9"/><path d="M7 16c1 1 2 2 5 2s4-1 5-2"/></svg>`,
  default: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8 7 17M17 7l2.8-2.8"/></svg>`
};

function waveBars(n){
  let html = '';
  for(let i=0;i<n;i++){
    const delay = (i*0.09).toFixed(2);
    html += `<span style="animation-delay:${delay}s"></span>`;
  }
  return html;
}

function renderLED(device){
  const isOn = device.status === 'ON';
  const card = document.createElement('div');
  card.className = 'card' + (isOn ? ' active' : '');
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${ledIcon}</div>
      <span class="pin-tag">GPIO ${device.pin}</span>
    </div>
    <div class="card-name">${device.device_name}</div>
    <div class="card-type">${device.device_type}</div>
    <div class="card-bottom">
      <span class="state-text ${isOn ? 'on':'off'}">${isOn ? '● เปิดอยู่' : '○ ปิดอยู่'}</span>
      <div class="switch ${isOn ? 'on':''}" data-id="${device.id}" data-status="${device.status}" role="button" aria-label="toggle ${device.device_name}">
        <div class="knob"></div>
      </div>
    </div>
    <div class="timestamp-row">อัปเดตล่าสุด ${device.created_at}</div>
  `;
  return card;
}

function renderSensor(device){
  const card = document.createElement('div');
  card.className = 'card sensor active';
  const icon = sensorIcons[device.device_name] || sensorIcons.default;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${icon}</div>
      <span class="pin-tag">GPIO ${device.pin}</span>
    </div>
    <div class="card-name">${device.device_name}</div>
    <div class="card-type">${device.device_type}</div>
    <div class="card-bottom" style="align-items:flex-end;">
      <span class="state-text active">${device.status}</span>
      <div class="wave">${waveBars(10)}</div>
    </div>
    <div class="timestamp-row">อัปเดตล่าสุด ${device.created_at}</div>
  `;
  return card;
}

async function toggleLED(sw){
  const id = sw.dataset.id;
  const current = sw.dataset.status;
  const next = current === 'ON' ? 'OFF' : 'ON';
  sw.setAttribute('disabled','true');
  try{
    const res = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, status: next })
    });
    if(!res.ok) throw new Error('network');
    showToast(`สั่ง ${next === 'ON' ? 'เปิด' : 'ปิด'} อุปกรณ์สำเร็จ`);
  }catch(e){
    showToast('ไม่สามารถส่งคำสั่งได้ (เซิร์ฟเวอร์ไม่รองรับการเขียนค่า)');
  }finally{
    sw.removeAttribute('disabled');
    fetchData();
  }
}

async function fetchData(){
  try{
    const res = await fetch(API, { cache:'no-store' });
    const json = await res.json();
    if(!json.success) throw new Error('api error');

    connDot.classList.remove('off');
    connText.textContent = `เชื่อมต่อแล้ว · ${json.count} อุปกรณ์`;

    const leds = json.data.filter(d => d.device_type === 'LED');
    const sensors = json.data.filter(d => d.device_type !== 'LED');

    ledGrid.innerHTML = '';
    leds.forEach(d => ledGrid.appendChild(renderLED(d)));
    ledGrid.querySelectorAll('.switch').forEach(sw=>{
      sw.addEventListener('click', ()=>toggleLED(sw));
    });

    sensorGrid.innerHTML = '';
    sensors.forEach(d => sensorGrid.appendChild(renderSensor(d)));

  }catch(e){
    connDot.classList.add('off');
    connText.textContent = 'เชื่อมต่อไม่ได้';
  }
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>

  .switch[disabled]{opacity:.5; cursor:not-allowed;}

  /* sensor mini readout (decorative live wave) */
  .wave{height:30px; display:flex; align-items:flex-end; gap:2px; margin-top:2px;}
  .wave span{
    width:3px; background:var(--amber); opacity:0.45; border-radius:2px;
    animation:wave 1.4s ease-in-out infinite;
  }
  @keyframes wave{
    0%,100%{height:5px; opacity:.3;}
    50%{height:22px; opacity:.7;}
  }

  /* FOOTER / LOG */
  .timestamp-row{
    font-family:'JetBrains Mono', monospace; font-size:0.66rem; color:var(--clay-dim);
    margin-top:14px; padding-top:14px; border-top:1px dashed var(--line);
  }

  footer{
    text-align:center; font-family:'JetBrains Mono', monospace;
    font-size:0.7rem; color:var(--clay-dim); margin-top:30px;
  }
  footer span{color:var(--leaf);}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#262c1d; border:1px solid var(--line); color:var(--clay);
    padding:10px 18px; border-radius:10px; font-size:0.8rem;
    font-family:'JetBrains Mono', monospace;
    opacity:0; pointer-events:none; transition:all .3s ease;
    z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .skeleton{
    background:linear-gradient(90deg, var(--card) 25%, #2a3020 50%, var(--card) 75%);
    background-size:200% 100%; animation:shimmer 1.4s infinite;
    border-radius:8px; height:14px; width:60%;
  }
  @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

  @media (max-width:480px){
    header{align-items:flex-start;}
    .brand h1{font-size:1.25rem;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0c130a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22V12"/><path d="M12 12C12 7 8 4 4 4c0 5 3 8 8 8z"/><path d="M12 12c0-5 4-8 8-8 0 5-3 8-8 8z"/>
        </svg>
      </div>
      <div>
        <h1>FarmGrid</h1>
        <p>แผงควบคุมอุปกรณ์ ESP32 · sbtc-mng</p>
      </div>
    </div>
    <div class="status-pill" id="conn-pill">
      <span class="dot" id="conn-dot"></span>
      <span id="conn-text">กำลังเชื่อมต่อ…</span>
    </div>
  </header>

  <div class="section-label">อุปกรณ์ควบคุม · Actuators</div>
  <div class="grid" id="led-grid">
    <div class="card"><div class="skeleton"></div></div>
    <div class="card"><div class="skeleton"></div></div>
  </div>

  <div class="section-label">เซนเซอร์ · Live Sensors</div>
  <div class="grid" id="sensor-grid">
    <div class="card"><div class="skeleton"></div></div>
  </div>

  <footer>อัปเดตอัตโนมัติทุก <span id="refresh-sec">5</span> วินาที · ดึงข้อมูลผ่าน Vercel Proxy</footer>
</div>

<div class="toast" id="toast"></div>

<script>
// แก้ไขตรงนี้: เปลี่ยนให้เรียกผ่านตัวแปลงเส้นทางภายในเว็บตัวเองเพื่อหลบเลี่ยง Mixed Content บล็อก
const API = "/api/data"; 

const ledGrid = document.getElementById('led-grid');
const sensorGrid = document.getElementById('sensor-grid');
const connDot = document.getElementById('conn-dot');
const connText = document.getElementById('conn-text');
const toastEl = document.getElementById('toast');

let toastTimer;
function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 2400);
}

const ledIcon = `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2z"/></svg>`;
const sensorIcons = {
  Temperature: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/></svg>`,
  Humidity: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69s6 6.2 6 10.31a6 6 0 0 1-12 0c0-4.11 6-10.31 6-10.31z"/></svg>`,
  "Soil Moisture": `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M2 12c0-5 4-9 10-9s10 4 10 9"/><path d="M7 16c1 1 2 2 5 2s4-1 5-2"/></svg>`,
  default: `<svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.2 4.2l2.8 2.8M17 17l2.8 2.8M1 12h4M19 12h4M4.2 19.8 7 17M17 7l2.8-2.8"/></svg>`
};

function waveBars(n){
  let html = '';
  for(let i=0;i<n;i++){
    const delay = (i*0.09).toFixed(2);
    html += `<span style="animation-delay:${delay}s"></span>`;
  }
  return html;
}

function renderLED(device){
  const isOn = device.status === 'ON';
  const card = document.createElement('div');
  card.className = 'card' + (isOn ? ' active' : '');
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${ledIcon}</div>
      <span class="pin-tag">GPIO ${device.pin}</span>
    </div>
    <div class="card-name">${device.device_name}</div>
    <div class="card-type">${device.device_type}</div>
    <div class="card-bottom">
      <span class="state-text ${isOn ? 'on':'off'}">${isOn ? '● เปิดอยู่' : '○ ปิดอยู่'}</span>
      <div class="switch ${isOn ? 'on':''}" data-id="${device.id}" data-status="${device.status}" role="button" aria-label="toggle ${device.device_name}">
        <div class="knob"></div>
      </div>
    </div>
    <div class="timestamp-row">อัปเดตล่าสุด ${device.created_at}</div>
  `;
  return card;
}

function renderSensor(device){
  const card = document.createElement('div');
  card.className = 'card sensor active';
  const icon = sensorIcons[device.device_name] || sensorIcons.default;
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${icon}</div>
      <span class="pin-tag">GPIO ${device.pin}</span>
    </div>
    <div class="card-name">${device.device_name}</div>
    <div class="card-type">${device.device_type}</div>
    <div class="card-bottom" style="align-items:flex-end;">
      <span class="state-text active">${device.status}</span>
      <div class="wave">${waveBars(10)}</div>
    </div>
    <div class="timestamp-row">อัปเดตล่าสุด ${device.created_at}</div>
  `;
  return card;
}

async function toggleLED(sw){
  const id = sw.dataset.id;
  const current = sw.dataset.status;
  const next = current === 'ON' ? 'OFF' : 'ON';
  sw.setAttribute('disabled','true');
  try{
    const res = await fetch(API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ id, status: next })
    });
    if(!res.ok) throw new Error('network');
    showToast(`สั่ง ${next === 'ON' ? 'เปิด' : 'ปิด'} อุปกรณ์สำเร็จ`);
  }catch(e){
    showToast('ไม่สามารถส่งคำสั่งได้ (เซิร์ฟเวอร์ไม่รองรับการเขียนค่า)');
  }finally{
    sw.removeAttribute('disabled');
    fetchData();
  }
}

async function fetchData(){
  try{
    const res = await fetch(API, { cache:'no-store' });
    const json = await res.json();
    if(!json.success) throw new Error('api error');

    connDot.classList.remove('off');
    connText.textContent = `เชื่อมต่อแล้ว · ${json.count} อุปกรณ์`;

    const leds = json.data.filter(d => d.device_type === 'LED');
    const sensors = json.data.filter(d => d.device_type !== 'LED');

    ledGrid.innerHTML = '';
    leds.forEach(d => ledGrid.appendChild(renderLED(d)));
    ledGrid.querySelectorAll('.switch').forEach(sw=>{
      sw.addEventListener('click', ()=>toggleLED(sw));
    });

    sensorGrid.innerHTML = '';
    sensors.forEach(d => sensorGrid.appendChild(renderSensor(d)));

  }catch(e){
    connDot.classList.add('off');
    connText.textContent = 'เชื่อมต่อไม่ได้';
  }
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
